<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Manual: The Brick Wall</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'JetBrains Mono', monospace; margin: 0; padding: 40px; }
        header { text-align: center; margin-bottom: 60px; border-bottom: 4px solid #333; padding-bottom: 20px; }
        h1 { color: #00ff9d; text-transform: uppercase; letter-spacing: 6px; font-size: 2.5rem; margin: 0; }
        p { color: #666; margin-top: 10px; }

        #wall-container { max-width: 1000px; margin: 0 auto; position: relative; padding-bottom: 100px; }
        
        .layer { display: flex; justify-content: center; margin-bottom: -15px; position: relative; z-index: 1; }
        .layer:nth-child(even) { margin-left: 105px; } /* Stagger the layers */

        .brick {
            width: 200px;
            height: 90px;
            background: #2a2a2a;
            border: 2px solid #444;
            margin: 0 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 0 #1a1a1a;
            position: relative;
        }

        .brick:hover { transform: translateY(-5px); border-color: #00ff9d; box-shadow: 0 10px 0 #00ff9d33; z-index: 10; }
        .brick .word { font-weight: 900; font-size: 16px; text-transform: uppercase; color: #fff; }
        .brick .date { font-size: 10px; color: #00ff9d; margin-top: 5px; opacity: 0.8; }

        /* Modal Styling */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; justify-content: center; align-items: center; }
        #modal-content { background: #1e1e1e; border: 2px solid #00ff9d; padding: 40px; max-width: 650px; border-radius: 2px; position: relative; }
        #modal h2 { color: #00ff9d; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 15px; }
        #modal p { line-height: 1.6; color: #ccc; }
        .close-btn { position: absolute; top: 15px; right: 20px; cursor: pointer; font-size: 30px; color: #ff4444; transition: 0.2s; }
        .close-btn:hover { color: #fff; }
    </style>
</head>
<body>

<header>
    <h1>The Jarvis Wall</h1>
    <p>Foundation to Penthouse: A visual history of autonomous capability.</p>
</header>

<div id="wall-container">
    <!-- Layers will be injected here -->
</div>

<div id="modal">
    <div id="modal-content">
        <span class="close-btn" onclick="document.getElementById('modal').style.display='none'">&times;</span>
        <h2 id="modal-title"></h2>
        <p id="modal-date"></p>
        <p id="modal-desc"></p>
    </div>
</div>

<script>
    // Organized by "Layers" of complexity (Foundation -> Advanced)
    const layers = [
        // Layer 1: The Foundation (Basic Access)
        [
            { word: "Screen Pilot", date: "Apr 1, 2026", desc: "Using osascript to move the mouse and type. The 'Hands' of the system." },
            { word: "Git Guardian", date: "Apr 4, 2026", desc: "Auto-backup every hour. Ensures the brain is never lost." },
            { word: "Nudge Loop", date: "Apr 2, 2026", desc: "Native macOS alerts for Approve/Deny. The 'Conscience' of the agent." },
            { word: "Local Voice", date: "Apr 4, 2026", desc: "Offline STT/TTS using Whisper and macOS 'say'. The 'Ears'." }
        ],
        // Layer 2: The Structure (Web & UI)
        [
            { word: "Form Filler", date: "Apr 4, 2026", desc: "Playwright-based automation for the Autensa Mission Control UI." },
            { word: "UI Inspector", date: "Apr 4, 2026", desc: "Tools to map dynamic DOM elements and find 'rocketship' buttons." },
            { word: "Browser Use", date: "Apr 4, 2026", desc: "LLM-driven accessibility tree navigation. The 'Eyes'." },
            { word: "Task Queue", date: "Apr 2, 2026", desc: "File-based task management (TASKS.md) for persistent goals." }
        ],
        // Layer 3: The Intelligence (Autonomy)
        [
            { word: "Self-Healing", date: "Apr 4, 2026", desc: "Auto-detection of syntax errors and AI-driven repair." },
            { word: "Multi-Agent", date: "Apr 4, 2026", desc: "Researcher/Coder/Reviewer council for complex problem solving." },
            { word: "Manual Wall", date: "Apr 4, 2026", desc: "This visual dashboard. Seeing the system's state at a glance." }
        ]
    ];

    // Fetch live data from the server
    fetch('/data')
        .then(res => res.json())
        .then(layers => {
            const container = document.getElementById('wall-container');
            layers.forEach(layer => {
                const layerDiv = document.createElement('div');
                layerDiv.className = 'layer';
                
                layer.forEach(brick => {
                    const el = document.createElement('div');
                    el.className = 'brick';
                    el.innerHTML = `<div class="word">${brick.word}</div><div class="date">${brick.date}</div>`;
                    el.onclick = () => {
                        document.getElementById('modal-title').innerText = brick.word;
                        document.getElementById('modal-date').innerText = `Learned: ${brick.date}`;
                        document.getElementById('modal-desc').innerText = brick.desc;
                        modal.style.display = 'flex';
                    };
                    layerDiv.appendChild(el);
                });
                container.appendChild(layerDiv);
            });
        })
        .catch(err => console.error('Failed to load bricks:', err));
</script>

</body>
</html>
